<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex">
    <title>Miyamae ES | Casual Beginner's Gym Tokyo</title>
    <meta name="description" content="We C.B.gym are International Sports community since January 2023.">

    <link rel="stylesheet" href="/assets/css/header.css">
    <link rel="stylesheet" href="/assets/css/footer.css">
    <link rel="stylesheet" href="/assets/css/common.css">
    <link rel="stylesheet" href="/assets/css/utility.css">
    <link rel="stylesheet" href="/assets/css/locations.css">
    <link rel="stylesheet" href="/assets/css/gym_location.css">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="//cdn.jsdelivr.net/npm/slick-carousel@1.8.1/slick/slick.css"/>
    <link rel="stylesheet" href="/assets/slick/slick-theme.css"/>
</head>
<body>
    <!-- Include header -->
    <div w3-include-html="/assets/include/header.html"></div>
    <!-- Include header -->

    <main>
        <div class="contents">
            <section class="gym-locations location-mt-fix">
                <div class="text-title">
                    <h2>Miyamae ES</h2>
                    <div class="text-title__japanese">&nbsp;/宮前小学校</div>
                </div>

                <h3 class="text-center gym-locations__directions">Directions</h3>

                <div class="image-box">
                    <figure>
                        <img src="/assets/img/locations/miyamae_es/miyamae_es_img01.png" alt="">
                        <figcaption>The gate is located to the south.</figcaption>
                    </figure>
                </div>

                <div class="arrow-container">
                    <div class="arrow-bottom"></div>
                </div>

                <div class="image-box">
                    <figure>
                        <img src="/assets/img/locations/miyamae_es/miyamae_es_img02.jpg" alt="">
                        <figcaption>If the gate is locked, ring the chime below and inform security by saying, "Taiikukan desu." and the lock will be released.</figcaption>
                    </figure>
                </div>

                <div class="arrow-container">
                    <div class="arrow-bottom"></div>
                </div>

                <div class="image-box img-wholePhoto">
                    <figure>
                        <img src="/assets/img/locations/miyamae_es/miyamae_es_img03.jpg" alt="">
                    </figure>
                </div>

                <div class="arrow-container">
                    <div class="arrow-bottom"></div>
                </div>

                <div class="image-box">
                    <figure>
                        <img src="/assets/img/locations/miyamae_es/miyamae_es_img04.jpg" alt="">
                        <figcaption>Once you enter, you will find the entrance to the school building on your left.</figcaption>
                    </figure>
                </div>

                <div class="arrow-container">
                    <div class="arrow-bottom"></div>
                </div>

                <div class="image-box">
                    <figure>
                        <img src="/assets/img/locations/miyamae_es/miyamae_es_img05.jpg" alt="">
                        <figcaption>Please take off your shoes at the entrance and proceed to the 3rd floor via the staircase in front of you.</figcaption>
                    </figure>
                </div>

                <div class="arrow-container">
                    <div class="arrow-bottom"></div>
                </div>

                <div class="image-box">
                    <figure>
                        <img src="/assets/img/locations/miyamae_es/miyamae_es_img06.jpg" alt="">
                        <figcaption>When you reach the 3rd floor, turn left.</figcaption>
                    </figure>
                </div>

                <div class="arrow-container">
                    <div class="arrow-bottom"></div>
                </div>

                <div class="image-box">
                    <figure>
                        <img src="/assets/img/locations/miyamae_es/miyamae_es_img07.jpg" alt="">
                        <figcaption>Upon entering the gymnasium, please check in and make payments before playing.</figcaption>
                    </figure>
                </div>

                <h3 class="text-center mt70">Google maps</h3>

                <div class="google-maps">
                    <iframe src="https://www.google.com/maps/embed?pb=!1m17!1m12!1m3!1d3243.657551595559!2d139.718647!3d35.61151299999999!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m2!1m1!2zMzXCsDM2JzQxLjUiTiAxMznCsDQzJzA3LjEiRQ!5e0!3m2!1sen!2sjp!4v1713851201460!5m2!1sen!2sjp"width="100%" height="450" style="border:0;" allowfullscreen="" loading="lazy" referrerpolicy="no-referrer-when-downgrade"></iframe>
                </div>

            </section>
        </div>
    </main>

    <!-- Include footer -->
    <div w3-include-html="/assets/include/footer.html"></div>
    <!-- Include footer -->

    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="/assets/slick/slick.min.js"></script>
    <script src="/assets/js/all.js"></script>
    <script>includeHTML();</script>

</body>
</html>
