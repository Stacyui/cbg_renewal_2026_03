    <link rel="stylesheet" href="/assets/css/header.css">

    <link rel="stylesheet" href="/assets/css/common.css">
    <link rel="stylesheet" href="/assets/css/utility.css">

    <link rel="preconnect" href="https://fonts.googleapis.com">

<body>
    <!-- Include header -->
    <div w3-include-html="/assets/include/header.html"></div>
    <!-- Include header -->

    <main>
        <div class="contents">
            <section class="gym-locations location-mt-fix">
                <div class="text-title">
                    <h2>Jonan ES</h2>
                    <div class="text-title__japanese">&nbsp;/城南小学校</div>
                </div>

                <h3 class="text-center gym-locations__directions">Directions</h3>

                <div class="image-box">
                    <figure>
                        <img src="/assets/img/locations/jonan_es/jonan_es_img01.jpg" alt="">
                        <figcaption>Please enter through the eastern school gate.</figcaption>
                    </figure>
                </div>

                <div class="arrow-container">
                    <div class="arrow-bottom"></div>
                </div>

                <div class="image-box">
                    <figure>
                        <img src="/assets/img/locations/jonan_es/jonan_es_img02.jpg" alt="">
                        <figcaption>Go straight ahead and turn left then enter the school by passing in front of the security. </figcaption>
                    </figure>
                </div>

                <div class="arrow-container">
                    <div class="arrow-bottom"></div>
                </div>

                <div class="image-box img-wholePhoto">
                    <figure>
                        <img src="/assets/img/locations/jonan_es/jonan_es_img03.jpg" alt="">
                        <figcaption>
                            Once inside, there is a staircase on the left.<br>
                            Go down the stairs to B2F, You will find the gymnasium on the right.
                        </figcaption>
                    </figure>
                </div>
                
                <h3 class="text-center mt70">Google maps</h3>

                <div class="google-maps">
                    <iframe src="https://www.google.com/maps/embed?pb=!1m14!1m8!1m3!1d26319.590789028884!2d139.6988056!3d35.6155815!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x60188a6ff259199d%3A0xef6618c0b1dd642!2sJonan%20Elementary%20School!5e1!3m2!1sen!2smy!4v1723277480191!5m2!1sen!2smy" width="100%" height="450" style="border:0;" allowfullscreen="" loading="lazy" referrerpolicy="no-referrer-when-downgrade"></iframe>
                </div>

            </section>

    <!-- Include footer -->
    <div w3-include-html="/assets/include/footer.html"></div>
