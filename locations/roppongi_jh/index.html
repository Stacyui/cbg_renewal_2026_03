<!DOCTYPE html>
<html lang="en">
<head>

    <meta http-equiv="X-UA-Compatible" content="IE=edge">

    <title>Roppongi JH | Casual Beginner's Gym Tokyo</title>

    <link rel="stylesheet" href="/assets/css/header.css">
    <link rel="stylesheet" href="/assets/css/footer.css">
    <link rel="stylesheet" href="/assets/css/common.css">
    <link rel="stylesheet" href="/assets/css/utility.css">
    <link rel="stylesheet" href="/assets/css/locations.css">

    <link rel="preconnect" href="https://fonts.googleapis.com">

<body>
    <!-- Include header -->
    <div w3-include-html="/assets/include/header.html"></div>
    <!-- Include header -->

    <main>
        <div class="contents">
            <section class="gym-locations location-mt-fix">
                <div class="text-title">
                    <h2>Roppongi JH</h2>
                    <div class="text-title__japanese">&nbsp;/六本木中学校</div>
                </div>

                <h3 class="text-center gym-locations__directions">Directions</h3>

                <div class="image-box img-wholePhoto">
                    <figure>
                        <img src="/assets/img/locations/roppongi_jh/roppongi_jh_img01.jpg" alt="">
                        <figcaption>
                            The gate is on the east side.
                        </figcaption>
                    </figure>
                </div>

                <div class="arrow-container">
                    <div class="arrow-bottom"></div>
                </div>

                <div class="image-box img-wholePhoto">
                    <figure>
                        <img src="/assets/img/locations/roppongi_jh/roppongi_jh_img02.jpg" alt="">
                    </figure>
                </div>

                <div class="arrow-container">
                    <div class="arrow-bottom"></div>
                </div>

                <div class="image-box img-wholePhoto">
                    <figure>
                        <img src="/assets/img/locations/roppongi_jh/roppongi_jh_img03.jpg" alt="">
                        <figcaption>
                            The door immediately to the left of the gate is open, so please enter from there.
                        </figcaption>
                    </figure>
                </div>

                <div class="image-box img-wholePhoto">
                    <figure>
                        <img src="/assets/img/locations/roppongi_jh/roppongi_jh_img04.jpg" alt="">
                        <figcaption>
                            Go straight ahead, and the entrance will be on your left. Please take off your shoes and line them up at the entrance.
                        </figcaption>
                    </figure>
                </div>

                <div class="image-box img-wholePhoto">
                    <figure>
                        <img src="/assets/img/locations/roppongi_jh/roppongi_jh_img05.jpg" alt="">
                    </figure>
                </div>
                
                <h3 class="text-center mt70">Google maps</h3>

                <div class="google-maps">
                    <iframe src="https://www.google.com/maps/embed?pb=!1m17!1m12!1m3!1d3283.87650112168!2d139.732609!3d35.660568!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m2!1m1!2zMzXCsDM5JzM4LjAiTiAxMznCsDQzJzU3LjQiRQ!5e1!3m2!1sen!2smy!4v1752487875821!5m2!1sen!2smy" width="100%" height="450" style="border:0;" allowfullscreen="" loading="lazy" referrerpolicy="no-referrer-when-downgrade"></iframe>
                </div>

            </section>
        </div>
    </main>

    <!-- Include footer -->
    <div w3-include-html="/assets/include/footer.html"></div>
    <!-- Include footer -->

    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="/assets/slick/slick.min.js"></script>
