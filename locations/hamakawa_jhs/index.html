<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex">
    <title>Hamakawa JHS | Casual Beginner's Gym Tokyo</title>
    <meta name="description" content="We C.B.gym are International Sports community since January 2023.">

    <link rel="stylesheet" href="/assets/css/header.css">
    <link rel="stylesheet" href="/assets/css/footer.css">
    <link rel="stylesheet" href="/assets/css/common.css">
    <link rel="stylesheet" href="/assets/css/utility.css">
    <link rel="stylesheet" href="/assets/css/locations.css">
    <link rel="stylesheet" href="/assets/css/gym_location.css">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="//cdn.jsdelivr.net/npm/slick-carousel@1.8.1/slick/slick.css"/>
    <link rel="stylesheet" href="/assets/slick/slick-theme.css"/>
</head>
<body>
    <!-- Include header -->
    <div w3-include-html="/assets/include/header.html"></div>
    <!-- Include header -->

    <main>
        <div class="contents">
            <section class="gym-locations location-mt-fix">
                <div class="text-title">
                    <h2>Hamakawa JHS</h2>
                    <div class="text-title__japanese">&nbsp;/浜川中学校</div>
                </div>

                <h3 class="text-center gym-locations__directions">Directions</h3>

                <div class="image-box">
                    <figure>
                        <img src="/assets/img/locations/hamakawa_jhs/hamakawa_jhs_img01.jpg" alt="">
                        <figcaption>
                            Please enter through the western school gate.<br>
                            If gate is locked (usually not) please ring the bell and say "Taiikukan desu" to the security.
                        </figcaption>
                    </figure>
                </div>

                <div class="arrow-container">
                    <div class="arrow-bottom"></div>
                </div>

                <div class="image-box">
                    <figure>
                        <img src="/assets/img/locations/hamakawa_jhs/hamakawa_jhs_img02.jpg" alt="">
                    </figure>
                </div>

                <div class="arrow-container">
                    <div class="arrow-bottom"></div>
                </div>

                <div class="image-box">
                    <figure>
                        <img src="/assets/img/locations/hamakawa_jhs/hamakawa_jhs_img03.jpg" alt="">
                        <figcaption>When you enter the entrance, turn left and walk along the left side of the corridor and follow the path. At the end, turn right</figcaption>
                    </figure>
                </div>

                <div class="arrow-container">
                    <div class="arrow-bottom"></div>
                </div>

                <div class="image-box">
                    <figure>
                        <img src="/assets/img/locations/hamakawa_jhs/hamakawa_jhs_img04.jpg" alt="">
                        <figcaption>You will see a door to the new school building. Please remove your shoes in front of that door.&nbsp;&#128095;</figcaption>
                    </figure>
                </div>

                <div class="arrow-container">
                    <div class="arrow-bottom"></div>
                </div>

                <div class="image-box">
                    <figure>
                        <img src="/assets/img/locations/hamakawa_jhs/hamakawa_jhs_img05.jpg" alt="">
                        <figcaption>Once inside the new building, take the stairs to the 3rd floor.</figcaption>
                    </figure>
                </div>

                <div class="arrow-container">
                    <div class="arrow-bottom"></div>
                </div>

                <div class="image-box">
                    <figure>
                        <img src="/assets/img/locations/hamakawa_jhs/hamakawa_jhs_img06.jpg" alt="">
                    </figure>
                </div>

                <div class="arrow-container">
                    <div class="arrow-bottom"></div>
                </div>

                <div class="image-box">
                    <figure>
                        <img src="/assets/img/locations/hamakawa_jhs/hamakawa_jhs_img07.jpg" alt="">
                    </figure>
                </div>
                
                <h3 class="text-center mt70">Google maps</h3>

                <div class="google-maps">
                    <iframe src="https://www.google.com/maps/embed?pb=!1m14!1m8!1m3!1d1645.2946570924921!2d139.7364219!3d35.6000078!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x601861d61308b545%3A0x5492b01295710e87!2sShinagawa%20Kuritsu%20Hamakawa%20Junior%20High%20School!5e1!3m2!1sen!2smy!4v1723283643436!5m2!1sen!2smy" width="100%" height="450" style="border:0;" allowfullscreen="" loading="lazy" referrerpolicy="no-referrer-when-downgrade"></iframe>
                </div>

            </section>
        </div>
    </main>

    <!-- Include footer -->
    <div w3-include-html="/assets/include/footer.html"></div>
    <!-- Include footer -->

    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="/assets/slick/slick.min.js"></script>
    <script src="/assets/js/all.js"></script>
    <script>includeHTML();</script>

</body>
</html>
