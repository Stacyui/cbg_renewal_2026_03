<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Casual Beginner's Gym Tokyo</title>
    <meta name="description" content="We C.B.gym are International Sports community since January 2023.">
    
    <link rel="stylesheet" href="/assets/css/header.css">
    <link rel="stylesheet" href="/assets/css/footer.css">
    <link rel="stylesheet" href="/assets/css/common.css">
    <link rel="stylesheet" href="/assets/css/sports.css">
    <link rel="stylesheet" href="/assets/css/top.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="//cdn.jsdelivr.net/npm/slick-carousel@1.8.1/slick/slick.css"/>
    <link rel="stylesheet" href="/assets/slick/slick-theme.css"/>
</head>
<body>
    <!-- Include header -->
    <div w3-include-html="/assets/include/header.html"></div>
    <!-- Include header -->

    <main>
        <div class="contents">
            <section class="sports">
                <div class="text-title">
                    <h2 class="jump-point" id="sports">What kind of sports do we play?</h2>
                </div>
    
                <div class="image-text image-text-left">
                    <img src="/assets/img/sports/volleyball_01.png" alt="Volleyball" />
                    <div class="image-text-box image-text-box image-text-box-left">
                        <div class="image-text-box__h3">Volleyball</div>
                        <p></p>
                    </div>
                </div>
    
                <div class="image-text image-text-right">
                    <div class="image-text-box image-text-box-right">
                        <div class="image-text-box__h3">Floorball</div>
                        <p>Floor ball, is a beginner friendly version of Floor Hockey. Instead of a puck, a lightweight plastic ball is used.<br />
                        Contact is limited to a minimum and very easy to pick up.</p>
                    </div>
                    <img src="/assets/img/sports/floorball_01.jpg" alt="Floorball" />
                </div>
    
                <div class="image-text image-text-left">
                    <img src="/assets/img/sports/baseball_02.jpg" alt="Tennis" />
                    <div class="image-text-box image-text-box image-text-box-left">
                        <div class="image-text-box__h3">Baseball</div>
                        <p></p>
                    </div>
                </div>
    
                <div class="image-text image-text-right">
                    <div class="image-text-box image-text-box-right">
                        <div class="image-text-box__h3">Badminton</div>
                        <p></p>
                    </div>
                    <img src="/assets/img/sports/badminton_02.jpg" alt="Handball" />
                </div>
    
            </section>
        </div>
    </main>

    <!-- Include footer -->
    <div w3-include-html="/assets/include/footer.html"></div>
    <!-- Include footer -->

  <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
  <script src="/assets/slick/slick.min.js"></script>
  <script src="/assets/js/all.js"></script>
  <script>includeHTML();</script>
   
</body>
</html>
